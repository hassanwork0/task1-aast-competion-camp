<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>

    <link rel="stylesheet" href="styles/box_style.css">
    <link rel="stylesheet" href="styles/logo_style.css">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/form_style.css">
    <link rel="stylesheet" href="styles/plane_style.css">
    <link rel="stylesheet" href="styles/addon_style.css">
    <link rel="stylesheet" href="styles/summary_style.css">
    <link rel="stylesheet" href="styles/finish_style.css">
    <script src="scripts/navigation.js"></script>
    <script src="scripts/service.js"></script>
    <script src="scripts/addon.js"></script>
    <script src="scripts/summary.js"></script>
</head>

<body onload="getPageContent(1)">

    <div class="box">
        <div class="box_side">
            <img src="assets/apple.png" alt="logo" class="logo_side">
            <div class="box_side_items">
                <br>
                <div class="box_side_item" id="box_side_item_1">
                    <h2>Your Info</h2>
                </div>
                <br>
                <div class="box_side_item" id="box_side_item_2">
                    <h2>Select Plans</h2>
                </div>
                <br>
                <div class="box_side_item" id="box_side_item_3">
                    <h2>ADD-ONS</h2>
                </div>
                <br>
                <div class="box_side_item" id="box_side_item_4">
                    <h2>Summary</h2>
                </div>
            </div>
        </div>
        <div class="box_body">
            <div id="dynamic-content">
            </div>

            <div class="button_group">
                <button type="button" class="btn_back" id="back">Go Back</button>
                <button type="button" class="btn_next" id="next">Next Step</button>
                <button type="button" class="btn_next" id="finish">Finish</button>

            </div>
    </div>
</body>

</html>
